server {
    listen 80;
    server_name your-domain.com;   # 改成你的域名，或删掉这行用 IP 访问

    # Let's Encrypt 自动续期
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 强制跳转到 HTTPS（域名模式下取消注释）
    # return 301 https://$server_name$request_uri;
}

